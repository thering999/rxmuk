name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
      - master
  workflow_dispatch:

# Prevent multiple simultaneous deployments
concurrency:
  group: pages
  cancel-in-progress: true

# Minimal permissions - using OIDC token (most token-efficient)
permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  deploy:
    name: Deploy to Pages
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    
    steps:
      # Checkout code with minimal depth
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 1  # Optimize: minimal fetch for deploy

      # Configure Pages with caching
      - name: Configure GitHub Pages
        uses: actions/configure-pages@v4

      # Upload artifact from root folder
      - name: Upload deployment artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

      # Deploy with OIDC (no token exchange needed)
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
